<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="preconnect" href="https://kolo-website.s3.eu-west-1.amazonaws.com" crossorigin>
  <title>Koplus - SAM Booth Configurator</title>
  <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="min-h-screen bg-white text-gray-900">

  <div id="sam-app"></div>

  <script src="sam-configurator.js"></script>
  <script>
    SamApp({
      el: "#sam-app",
      products: [
        {   
          key: "single",
          label: "Single",
          title: "Sam Single Booth",
          subtitle: "A compact one-person booth for focused calls and deep work in an open-plan workspace.",
          skuPrefix: "SS",
          assetBase: "https://kolo-website.s3.eu-west-1.amazonaws.com/KoplusSam/sam_single",
          allGlassCode: "GS_NA",
          layers: [
            { key: "panel",     folder: "panel",       zIndex: 1 },
            { key: "interior",  folder: "interior",    zIndex: 2 },
            { key: "accBench",  folder: "accessories", zIndex: 3 },
            { key: "accDesk",   folder: "accessories", zIndex: 3 },
            { key: "exterior",  folder: "exterior",    zIndex: 4 },
            { key: "door",      folder: "frame",       zIndex: 5 }
          ],
          panels: [
            { code: "GS_NA", label: "Glass", icon: "glass" },
            { code: "WL_NA", label: "Wall",  icon: "wall" }
          ],
          accessories: {
            mode: "multi",
            items: [
              {
                code: "flex-bench",
                label: "Flex Bench",
                layerKey: "accBench",
                skuTemplate: "L3_AC_FB_{colour}",
                defaultColour: "GBN",
                paletteKey: "accUpholstery",
                excludeCodes: ["GLB"]
              },
              {
                code: "flex-desk",
                label: "Flex Desk",
                layerKey: "accDesk",
                skuTemplate: "L3_AC_FD_{colour}",
                defaultColour: "WH",
                paletteKey: "accDesk"
              }
            ]
          }
        },
        {
          key: "medium",
          label: "Medium",
          title: "Sam Medium Booth",
          subtitle: "A self-contained individual studio space designed for private work and longer sessions in an open-plan workspace.",
          skuPrefix: "SM",
          assetBase: "https://kolo-website.s3.eu-west-1.amazonaws.com/KoplusSam/sam_medium",
          allGlassCode: "GS_GS",
          layers: [
            { key: "panel",   folder: "panel",       zIndex: 1 },
            { key: "interior",folder: "interior",    zIndex: 2 },
            { key: "accDesk", folder: "accessories", zIndex: 3 },
            { key: "accSofa", folder: "accessories", zIndex: 3 },
            { key: "door",    folder: "frame",       zIndex: 4 },
            { key: "exterior",folder: "exterior",    zIndex: 5 }
          ],
          panels: [
            { code: "GS_GS", label: "2 Glasses",        icon: "2glass" },
            { code: "GS_WL", label: "L Glass + R Wall", icon: "glass-wall" },
            { code: "WL_GS", label: "L Wall + R Glass", icon: "wall-glass" },
            { code: "WL_WL", label: "2 Walls",          icon: "2wall" }
          ],
          exteriorPaletteKey: "exteriorMedium",
          accessories: {
            mode: "multi",
            items: [
              {
                code: "flip-desk",
                label: "Flip Desk",
                layerKey: "accDesk",
                skuTemplate: "L3_AC_FB_{colour}",
                defaultColour: "WH",
                paletteKey: "accDesk"
              },
              {
                code: "milli-sofa",
                label: "Milli Sofa",
                layerKey: "accSofa",
                skuTemplate: "L3_AC_SF_{colour}",
                defaultColour: "GBN",
                paletteKey: "accUpholstery"
              }
            ]
          },
          panelMissingInteriors: { "WL_WL": ["BUR"] }
        },
        {
          key: "large",
          label: "Large",
          title: "Sam Large Booth",
          subtitle: "A spacious booth for small team meetings and collaborative sessions away from the open floor.",
          skuPrefix: "SL",
          assetBase: "https://kolo-website.s3.eu-west-1.amazonaws.com/KoplusSam/sam_large",
          allGlassCode: "GS_GS",
          layers: [
            { key: "panel",    folder: "panel",    zIndex: 1 },
            { key: "interior", folder: "interior", zIndex: 2 },
            { key: "exterior", folder: "exterior", zIndex: 3 },
            { key: "door",     folder: "frame",    zIndex: 4 }
          ],
          panels: [
            { code: "GS_GS", label: "2 Glasses",        icon: "2glass" },
            { code: "GS_WL", label: "L Glass + R Wall", icon: "glass-wall" },
            { code: "WL_GS", label: "L Wall + R Glass", icon: "wall-glass" },
            { code: "WL_WL", label: "2 Walls",          icon: "2wall" }
          ]
        }
      ]
    });
  </script>

</body>
</html>
